name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Check (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gui/frontend_react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: gui/frontend_react

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: gui/frontend_react

  backend:
    name: Backend Check (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile gui/app.py
          python -m py_compile gui/api.py
          python -m py_compile gui/downloader.py
          python -m py_compile gui/utils.py
          echo "All Python files OK"
